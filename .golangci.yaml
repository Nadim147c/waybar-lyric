version: "2"

run:
  tests: false

linters:
  disable:
    - wrapcheck
  enable:
    - bodyclose
    - errname
    - exhaustive
    - exhaustruct
    - fatcontext
    - forbidigo
    - goconst
    - godot
    - gomoddirectives
    - goprintffuncname
    - gosec
    - iface
    - importas
    - intrange
    - mirror
    - misspell
    - modernize
    - nakedret
    - nestif
    - nilerr
    - noctx
    - nolintlint
    - perfsprint
    - prealloc
    - rowserrcheck
    - sloglint
    - sqlclosecheck
    - tparallel
    - unconvert
    - unparam
    - whitespace
  exclusions:
    rules:
      - text: '(slog|log)\.\w+'
        linters:
          - noctx
      - source: "^\\s*defer\\s+.*"
        linters:
          - errcheck
    generated: lax
    presets:
      - common-false-positives
  settings:
    forbidigo:
      forbid:
        - pattern: ^print(ln)?$
        - pattern: ^fmt\.Print.*$
          msg: Do not commit print statements.

    sloglint:
      kv-only: true

    exhaustruct:
      exclude:
        - '.+/cobra\.Command$'
        - '.+/http\.Server$'
        - ".+Waybar$"
      allow-empty: true
      allow-empty-rx:
        - '.*/http\.Cookie'
      allow-empty-returns: true
      allow-empty-declarations: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - goimports
    - gofumpt
  exclusions:
    generated: lax
