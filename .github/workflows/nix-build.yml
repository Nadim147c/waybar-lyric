name: Lint, Test and Build using nix

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  nix-builds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: NixOS/nix-installer-action@main
      - uses: Mic92/hestia@v2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          check-latest: true
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Go Mod Download
        run: go mod download

      - name: Go Mod Tidy
        run: nix run .#ci-go-mod-tidy

      - name: Format
        run: nix run .#ci-format

      - name: Go Lint
        run: nix run .#ci-lint

      - name: Go Tests
        run: nix run .#ci-test

      - name: Nix Build
        run: nix build .#default
