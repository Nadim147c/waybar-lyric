name: Go Tests

on:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "*.go"
      - "go.*"
      - "revive.toml"
      - ".github/workflows/*"
  pull_request:
    branches: [main]
    paths:
      - "**/*.go"
      - "*.go"
      - "go.*"
      - "revive.toml"
      - ".github/workflows/*"

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          check-latest: true
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run Gofumpt
        run: |
          go install mvdan.cc/gofumpt@latest
          gofumpt -d -e .

      - name: Run tests
        run: |
          go build ./...
          go vet ./...
          go test ./...

      - name: Run Lint
        uses: docker://morphy/revive-action:v2
        with:
          config: revive.toml
